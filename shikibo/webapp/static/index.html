<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ThreadMail System (shikibo)</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="page-container">
        <!-- Workspace Title Bar -->
        <div class="workspace-title-bar" id="workspace-title-bar">
            <div class="folder-name" id="folder-name">Loading folder...</div>
            <div class="folder-path" id="folder-path">...</div>
        </div>

        <div class="app-container">
            <!-- Sidebar -->
            <aside class="sidebar">
            <div class="sidebar-header">
                <h2>ThreadMail</h2>
                <div class="user-badge" id="user-badge">Loading...</div>
            </div>
            
            <nav class="sidebar-nav">
                <h3>Threads</h3>
                <div class="thread-list" id="thread-list" style="margin-bottom: 10px;">
                    <!-- Loaded dynamically -->
                </div>
                <button class="btn btn-secondary btn-full" id="btn-new-thread" style="margin-bottom: 20px;">+ New Thread</button>

            </nav>
            
            <div class="sidebar-footer">
                <h3>Coordinator</h3>
                <button class="btn btn-primary btn-full" id="btn-scan">Trigger Scan Now</button>
                <div class="scan-status" id="scan-status">Ready</div>
            </div>
        </aside>

        <!-- Main Workspace -->
        <main class="main-workspace">
            <!-- Selected Thread Pane -->
            <section class="thread-pane" id="thread-pane">
                <div class="thread-header" id="thread-header">
                    <h1 id="active-thread-title">Select a thread or create a new one</h1>
                    <p id="active-thread-desc"></p>
                    <button class="btn btn-secondary" id="btn-pause-resume" style="display: none; position: absolute; right: 140px; top: 20px;">Pause Updates</button>
                    <button class="btn btn-danger" id="btn-mark-done" style="display: none;">Mark DONE</button>
                </div>
                
                <div class="message-timeline" id="message-timeline">
                    <!-- Messages loaded here -->
                    <div class="empty-state">No thread selected</div>
                </div>
                
                <!-- Composer (Draft) Area -->
                <div class="composer" id="composer-area" style="display: none;">
                    <h3>Compose Draft</h3>
                    <textarea id="composer-body" placeholder="Write your markdown message..."></textarea>
                    
                    <div class="composer-controls">
                        <div class="attachments-row">
                            <input type="file" id="composer-file-input" style="display: none;">
                            <button class="btn btn-secondary btn-sm" id="btn-add-attachment">Attach File</button>
                            <span id="draft-attachments-list"></span>
                        </div>
                        
                        <div class="action-buttons">
                            <button class="btn btn-primary" id="btn-publish">Publish Message</button>
                        </div>
                    </div>
                </div>
            </section>
        </main>

        <!-- Utility Sidebar -->
        <aside class="util-bar">
            <div class="util-section">
                <h3>Outbox Status</h3>
                <div class="util-list" id="pending-list">
                    <div class="empty-state">No pending messages</div>
                </div>
            </div>
        </aside>
    </div>
    </div> <!-- page-container -->

    <!-- Modal for new thread -->
    <div class="modal" id="new-thread-modal">
        <div class="modal-content">
            <h3>Create New Thread</h3>
            <div class="form-group">
                <label for="thread-id-input">Thread ID (e.g. T_20260627_A1B2)</label>
                <input type="text" id="thread-id-input" placeholder="T_YYYYMMDD_XXXX">
            </div>
            <div class="form-group">
                <label for="thread-title-input">Title / Topic</label>
                <input type="text" id="thread-title-input" placeholder="Enter thread topic">
            </div>
            <div class="form-group">
                <label for="thread-desc-input">Description / README</label>
                <textarea id="thread-desc-input" placeholder="Explain the thread context..."></textarea>
            </div>
            <div class="modal-actions">
                <button class="btn btn-secondary" id="btn-close-modal">Cancel</button>
                <button class="btn btn-primary" id="btn-submit-thread">Create</button>
            </div>
        </div>
    </div>
    

    
    <script src="app.js"></script>
</body>
</html>
